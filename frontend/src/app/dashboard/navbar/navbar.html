<mat-toolbar class="dashboard-navbar">
    <div class="navbar-content">
        <!-- Left Section -->
        <div class="navbar-left">
            <button mat-icon-button class="menu-toggle">
                <mat-icon>menu</mat-icon>
            </button>
            <h1 class="page-title">Dashboard</h1>
        </div>

        <!-- Right Section -->
        <div class="navbar-right">
            <!-- Notifications -->
            <button mat-icon-button routerLink="/dashboard/notifications" class="notification-btn">
                <mat-icon [matBadge]="unreadCount$ | async"
                          [matBadgeHidden]="(unreadCount$ | async) === 0"
                          matBadgeColor="warn"
                          aria-hidden="false">notifications</mat-icon>
            </button>

            <!-- User Menu -->
            <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
                <mat-icon class="user-icon">account_circle</mat-icon>
                <span class="user-name">{{ userName }}</span>
                <mat-icon class="dropdown-icon">arrow_drop_down</mat-icon>
            </button>

            <mat-menu #userMenu="matMenu" class="user-dropdown">
                <div class="user-info-header">
                    <div class="user-avatar">
                        <mat-icon>account_circle</mat-icon>
                    </div>
                    <div class="user-details">
                        <div class="name">{{ userName }}</div>
                        <div class="email">{{ userEmail }}</div>
                    </div>
                </div>
                <mat-divider></mat-divider>
                <button mat-menu-item routerLink="/dashboard/profile">
                    <mat-icon>person</mat-icon>
                    <span>Profile</span>
                </button>
                <button mat-menu-item routerLink="/dashboard/settings">
                    <mat-icon>settings</mat-icon>
                    <span>Settings</span>
                </button>
                <mat-divider></mat-divider>
                <button mat-menu-item (click)="logout()">
                    <mat-icon>logout</mat-icon>
                    <span>Logout</span>
                </button>
            </mat-menu>
        </div>
    </div>
</mat-toolbar>
